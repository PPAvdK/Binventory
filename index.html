*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0B1120; /* Diep donkerblauw/zwart */
  --surface: #131B2F; /* Iets lichtere surface */
  --surface2: #1E293B; /* Voor input velden */
  --border: #2A364F;
  
  /* Frisse Smaragdgroene accenten voor boodschappen vibe */
  --accent: #10B981; 
  --accent-light: #34D399;
  --accent-gradient: linear-gradient(135deg, #10B981 0%, #059669 100%);
  --accent-dim: rgba(16, 185, 129, 0.15);
  
  --red: #F43F5E;
  --text: #F8FAFC;
  --muted: #94A3B8;
  --font-main: 'Plus Jakarta Sans', sans-serif;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  height: 100%;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* Zeer subtiele noise voor textuur */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.25;
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.screen {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.screen.active { display: flex; }

/* ══════════════════════════════════════
   SETUP SCREEN (API token invoeren)
══════════════════════════════════════ */
#screen-setup {
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  background: radial-gradient(circle at top, #131B2F 0%, var(--bg) 80%);
}

.setup-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
}

.brand-icon {
  width: 64px;
  height: 64px;
  background: var(--accent-gradient);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 12px 32px rgba(16, 185, 129, 0.3);
}

.brand-icon svg {
  width: 32px;
  height: 32px;
  color: #fff;
}

.setup-logo {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 8px;
}

.setup-logo span.accent { 
  color: var(--accent-light); 
}

.setup-sub {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 32px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.setup-card h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}

.setup-card a {
  color: var(--accent-light);
  text-decoration: none;
  font-weight: 600;
  transition: opacity 0.2s;
}

.setup-card a:hover { opacity: 0.8; }

.field { margin-bottom: 20px; }

.field label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
